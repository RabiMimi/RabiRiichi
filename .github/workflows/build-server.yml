name: Build Server

on: 
  push:
    branches: 
      - main
      - develop
    paths:
      - '**.cs'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.cs'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['9.0.x']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Install dependencies
        run: dotnet restore ./RabiRiichi.Server/RabiRiichi.Server.csproj
      - name: Build
        run: dotnet build --configuration Release --no-restore ./RabiRiichi.Server/RabiRiichi.Server.csproj
